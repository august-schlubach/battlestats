id: wows.account.info
provider: Wargaming
service: World of Warships Public API
endpoint: /wows/account/info/
purpose: Return player account details and statistics for one or more account IDs.
docs_url: https://developers.wargaming.net/reference/all/wows/account/info/

hosts:
  default: https://api.worldofwarships.com
  realms:
    eu: https://api.worldofwarships.eu
    na: https://api.worldofwarships.com
    asia: https://api.worldofwarships.asia

request:
  method: GET
  query_params:
    application_id:
      required: true
      type: string
      description: Wargaming application ID.
    account_id:
      required: true
      type: integer_or_csv_of_integers
      description: One or more player account IDs. Docs state a maximum limit of 100 IDs.
    access_token:
      required: false
      type: string
      description: Token for private user data when applicable.
    extra:
      required: false
      type: string
      description: Extra sections such as `statistics.clan`, `statistics.pve`, or private fields.
    fields:
      required: false
      type: string
      description: Comma-separated response field selection.
    language:
      required: false
      type: string
      description: Localization language.

response:
  envelope:
    status: string
    meta:
      count: integer
      hidden: integer_or_null
    data:
      account_id_keyed_object: true
  expected_data_shape:
    base_fields:
      account_id: integer
      nickname: string
      created_at: timestamp
      hidden_profile: boolean
      last_battle_time: timestamp
      stats_updated_at: timestamp
      updated_at: timestamp
    commonly_used_statistics:
      statistics:
        battles: integer
        pvp:
          battles: integer
          losses: integer
          survived_wins: integer
          wins: integer
          survived_battles: integer
    optional_behavior:
      extra_fields_are_sparse: true
      hidden_profiles_may_limit_available_data: true

observed_behavior:
  last_verified: 2026-03-09
  docs_notes:
    - Docs state players may hide their game profiles and instruct consumers to use `hidden_profile` for determination.
    - Docs list error `407 ACCOUNT_ID_LIST_LIMIT_EXCEEDED` when too many IDs are provided.
  live_notes:
    - This endpoint returned valid public data for tested active NA accounts.
    - For non-existent or wrong-realm IDs, the envelope can still be `status: ok` while `data[account_id]` is `null`.
    - Current repo logic relies on `statistics.pvp` values from this endpoint as the authoritative source for player cumulative PvP totals.

trust:
  rating: high
  suitable_for:
    - player lookup hydration after account ID is known
    - cumulative PvP totals
    - last battle timestamps
    - hidden profile detection
    - batched member hydration up to documented limits
  not_suitable_for:
    - recent per-day PvP slices
  recommendation: Treat as the primary trusted upstream account-details endpoint, with normal null checks for wrong-realm or missing accounts.

repo_usage:
  current_state:
    - Used as the main upstream source for player personal and cumulative PvP data.
    - Used in batched form for clan-member hydration.
    - Used as the practical fallback source when `account/statsbydate` fails to provide PvP daily slices.
  code_refs:
    - server/warships/api/players.py
    - server/warships/api/clans.py
    - server/warships/clan_crawl.py
    - server/warships/data.py

evidence_refs:
  knowledge_notes:
    - agents/knowledge/wows-account-hydration-notes.md
    - agents/knowledge/wows-statsbydate-status.md
    - agents/knowledge/wows-api-contract-strategy.md
  reproduced_with:
    - curl against https://api.worldofwarships.com/wows/account/info/
