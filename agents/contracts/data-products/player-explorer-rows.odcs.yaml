apiVersion: v3.1.0
kind: DataContract

id: player-explorer-rows-odcs-2026
name: player_explorer_rows
version: 0.1.0
status: draft
domain: battlestats
dataProduct: player-explorer
tenant: battlestats

description:
  purpose: Paginated explorer-row payload used for the player explorer API and filterable ranking UI.
  limitations: Represents a reduced tabular subset of the full player summary surface and intentionally omits some fields returned by player-summary detail.
  usage: Use for player-explorer API responses, sorting, filtering, and table rendering.
  authoritativeDefinitions:
    - url: https://developers.wargaming.net/reference/all/wows/account/info/
      type: implementation
      description: Primary upstream cumulative player stats source.
    - url: https://developers.wargaming.net/reference/all/wows/account/statsbydate/
      type: businessDefinition
      description: Documented upstream daily stats endpoint, currently not trusted for PvP daily slices.

tags:
  - world-of-warships
  - player-explorer
  - normalized

team:
  - role: owner
    description: battlestats maintainers

support:
  - channel: repo knowledge base
    description: See agents/knowledge for upstream API investigations and behavioral notes.
    tool: other

servers:
  - server: battlestats-django
    type: other
    description: Derived inside the Django application from build_player_summary and explorer-summary cache rows.

schema:
  - id: player_explorer_row_obj
    name: player_explorer_row
    logicalType: object
    physicalType: table
    description: One normalized player row returned in the paginated player explorer response.
    dataGranularityDescription: One row per player.
    properties:
      - id: player_id_prop
        name: player_id
        businessName: player id
        logicalType: integer
        physicalType: integer
        required: true
        description: World of Warships account identifier for the row.
        classification: public
      - id: name_prop
        name: name
        businessName: player name
        logicalType: string
        physicalType: string
        required: true
        description: Display name shown in the explorer UI.
        classification: public
      - id: is_hidden_prop
        name: is_hidden
        businessName: hidden profile flag
        logicalType: boolean
        physicalType: boolean
        required: true
        description: Whether the player profile is hidden.
        classification: public
      - id: days_since_last_battle_prop
        name: days_since_last_battle
        businessName: days since last battle
        logicalType: integer
        physicalType: integer
        required: false
        description: Number of days since the player's last battle, or null when unknown.
        classification: public
      - id: pvp_ratio_prop
        name: pvp_ratio
        businessName: PvP win rate
        logicalType: number
        physicalType: float
        required: false
        description: Overall PvP win rate percentage, or null when unavailable.
        classification: public
      - id: pvp_battles_prop
        name: pvp_battles
        businessName: PvP battles
        logicalType: integer
        physicalType: integer
        required: false
        description: Overall PvP battle count, or null when unavailable.
        classification: public
      - id: pvp_survival_rate_prop
        name: pvp_survival_rate
        businessName: PvP survival rate
        logicalType: number
        physicalType: float
        required: false
        description: PvP survival rate percentage, or null when unavailable.
        classification: public
      - id: kill_ratio_prop
        name: kill_ratio
        businessName: kill ratio
        logicalType: number
        physicalType: float
        required: false
        description: Derived kill ratio metric, or null when battle data is insufficient.
        classification: public
      - id: player_score_prop
        name: player_score
        businessName: player score
        logicalType: number
        physicalType: float
        required: false
        description: Derived composite ranking metric used by explorer sorting.
        classification: public
      - id: account_age_days_prop
        name: account_age_days
        businessName: account age days
        logicalType: integer
        physicalType: integer
        required: false
        description: Account age in days, or null when creation date is unavailable.
        classification: public
      - id: battles_last_29_days_prop
        name: battles_last_29_days
        businessName: battles last 29 days
        logicalType: integer
        physicalType: integer
        required: false
        description: Sum of recent 29-day battles, or null for hidden players.
        classification: public
      - id: active_days_last_29_days_prop
        name: active_days_last_29_days
        businessName: active days last 29 days
        logicalType: integer
        physicalType: integer
        required: false
        description: Count of active days in the recent 29-day window, or null for hidden players.
        classification: public
      - id: ships_played_total_prop
        name: ships_played_total
        businessName: ships played total
        logicalType: integer
        physicalType: integer
        required: false
        description: Count of ships with recorded PvP play, or null when battle data is unavailable.
        classification: public
      - id: ranked_seasons_participated_prop
        name: ranked_seasons_participated
        businessName: ranked seasons participated
        logicalType: integer
        physicalType: integer
        required: false
        description: Count of ranked seasons present in normalized ranked history.
        classification: public

quality:
  - description: Each explorer row should satisfy the PlayerExplorerRowSerializer schema.
  - description: Explorer rows intentionally expose a subset of the full player summary fields and should not introduce undocumented columns.
  - description: player_score and kill_ratio may be null when the source data is incomplete but must match the backend derivation logic.

slaProperties:
  - property: freshness
    value: on-demand
    description: Explorer rows are derived from current player data and refreshed explorer-summary cache state when needed.
